<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>검색 중... — {{ strategy.name }}</title>
    <style>
        :root {
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --primary-color: #2d7bfe;
            --text-primary: #ffffff;
            --text-secondary: #9090a8;
            --border-color: rgba(255, 255, 255, 0.08);
            --up-color: #ff4d4f;
            --down-color: #2d7bfe;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        @view-transition { navigation: auto; }
        @keyframes _vt-out {
            to { opacity: 0; transform: translateY(-6px) scale(0.99); }
        }
        @keyframes _vt-in {
            from { opacity: 0; transform: translateY(10px) scale(0.99); }
        }
        ::view-transition-old(root) { animation: 180ms ease-in _vt-out; }
        ::view-transition-new(root) { animation: 240ms cubic-bezier(0.2, 0, 0, 1) _vt-in; }

        body {
            background: var(--bg-color);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .overlay {
            position: fixed; inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 10;
        }

        .modal {
            position: relative;
            z-index: 20;
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 32px 24px;
            width: min(400px, 90vw);
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            animation: popIn 0.3s cubic-bezier(0.1, 0.8, 0.2, 1);
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.95) translateY(10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .spinner {
            width: 48px; height: 48px;
            border: 3px solid var(--border-color);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin .8s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
        .modal-sub { font-size: 13px; color: var(--text-secondary); margin-bottom: 24px; line-height: 1.4; }

        .bar-wrap {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            height: 8px;
            overflow: hidden;
            margin-bottom: 12px;
        }
        .bar-fill {
            height: 100%;
            border-radius: 8px;
            background: var(--primary-color);
            width: 0%;
            transition: width .3s ease;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 20px;
            font-weight: 600;
        }
        .stats .hit { color: var(--up-color); }

        .ticker-list {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            height: 100px;
            overflow: hidden;
            position: relative;
        }
        .ticker-inner {
            padding: 8px 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .ticker-item { font-size: 12px; font-family: monospace; color: var(--text-secondary); white-space: nowrap; text-align: left; }
        .ticker-item.match { color: var(--up-color); font-weight: 700; }
        .ticker-item.match::before { content: '✓ '; }
        
        .ticker-list::before, .ticker-list::after {
            content: ''; position: absolute; left: 0; right: 0; height: 20px; z-index: 1; pointer-events: none;
        }
        .ticker-list::before { top: 0; background: linear-gradient(to bottom, var(--surface-color), transparent); }
        .ticker-list::after { bottom: 0; background: linear-gradient(to top, var(--surface-color), transparent); }

        .btn-cancel {
            margin-top: 20px;
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 10px 0;
            width: 100%;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-cancel:active { background: rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body>
<div class="overlay"></div>
<div class="modal">
    <div class="spinner"></div>
    <div class="modal-title">{% if exchange == "kospi" %}주식/ETF 스크리닝 중...{% else %}코인 스크리닝 중...{% endif %}</div>
    <div class="modal-sub" id="sub-text">{% if exchange == "kospi" %}코스피 주식 및 ETF 데이터를 분석하고 있습니다{% else %}선택한 거래소의 전체 코인을 분석하고 있습니다{% endif %}</div>

    <div class="bar-wrap"><div class="bar-fill" id="bar"></div></div>
    <div class="stats">
        <span id="stat-left">0 / 0 종목 검사 중</span>
        <span class="hit" id="stat-right">✓ 0개 매칭</span>
    </div>

    <div class="ticker-list"><div class="ticker-inner" id="ticker-inner"></div></div>

    <button class="btn-cancel" onclick="cancel()">취소</button>
</div>

<script>
    const strategyId = {{ strategy.id }};
    const exchange   = "{{ exchange }}";
    const volLimit   = "{{ vol_limit }}";
    const sendTelegram = "{{ send_telegram|default:'0' }}";
    const streamUrl  = `/strategy/${strategyId}/search-stream/?exchange=${exchange}&vol_limit=${volLimit}&send_telegram=${sendTelegram}`;
    const resultUrl  = `/strategy/${strategyId}/results/?exchange=${exchange}&vol_limit=${volLimit}`;

    const bar        = document.getElementById('bar');
    const statLeft   = document.getElementById('stat-left');
    const statRight  = document.getElementById('stat-right');
    const subText    = document.getElementById('sub-text');
    const tickerWrap = document.getElementById('ticker-inner');

    let es;
    const MAX_TICKERS = 30;
    const tickerItems = [];

    function addTicker(symbol, isMatch) {
        const el = document.createElement('div');
        el.className = 'ticker-item' + (isMatch ? ' match' : '');
        el.textContent = symbol;
        tickerItems.push(el);
        tickerWrap.appendChild(el);
        if (tickerItems.length > MAX_TICKERS) tickerItems.shift().remove();
    }

    function cancel() {
        if (es) es.close();
        history.back();
    }

    es = new EventSource(streamUrl);
    es.onmessage = function(e) {
        const data = JSON.parse(e.data);
        if (data.type === 'progress') {
            const pct = data.pct;
            bar.style.width = pct + '%';
            statLeft.textContent  = `${data.done.toLocaleString()} / ${data.total.toLocaleString()} 검사 중`;
            statRight.textContent = `✓ ${data.matched}개 매칭`;

            if (pct < 30)       subText.textContent = '데이터를 분석하고 있습니다';
            else if (pct < 70)  subText.textContent = '절반 넘었어요, 조금만 기다려 주세요 ☕';
            else if (pct < 95)  subText.textContent = '거의 다 왔습니다!';
            else                subText.textContent = '마무리 중...';

            if (data.last_match) {
                const prevMatched = tickerItems.filter(t => t.classList.contains('match')).length;
                if (data.matched > prevMatched) addTicker(data.last_match, true);
            }
        }
        if (data.type === 'done') {
            es.close();
            bar.style.width = '100%';
            subText.textContent = '완료! 결과 페이지로 이동합니다...';
            setTimeout(() => { window.location.href = resultUrl; }, 400);
        }
        if (data.type === 'error') {
            es.close();
            alert(data.msg);
            history.back();
        }
    };
    es.onerror = function() {
        es.close();
        window.location.href = resultUrl;
    };
</script>
</body>
</html>
